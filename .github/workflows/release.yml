name: Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Octave Package ───────────────────────────────────────────────────────────
  build-octave:
    name: Build Octave Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need all tags for git describe

      - name: Setup Octave
        run: sudo apt-get update && sudo apt-get install -y octave

      - name: Run portable test suite
        run: |
          set -o pipefail
          octave --no-gui --eval "addpath('tests'); status = portable_runner(); if status ~= 0, error('portable_runner failed with %d failing tests', status); end"

      - name: Build .tar.gz package
        run: |
          set -o pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          bash ./tools/build_octave_package.sh "$VERSION" "$GITHUB_WORKSPACE/simulation_scripts-${VERSION}.tar.gz"

      - name: Upload Octave package
        uses: actions/upload-artifact@v4
        with:
          name: octave-package
          path: simulation_scripts-*.tar.gz
          retention-days: 90

  # ─── MATLAB Toolbox ────────────────────────────────────────────────────────────
  build-matlab:
    name: Build MATLAB Toolbox
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: ${{ vars.ENABLE_MATLAB_RELEASE == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: latest

      - name: Run portable test suite via MATLAB
        run: |
          matlab -batch "addpath('tests'); status = portable_runner(); if status ~= 0, error('portable_runner failed with %d failing tests', status); end"

      - name: Build .mltbx toolbox
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          bash ./tools/stage_release_package.sh "$PWD/build/release-staging"
          matlab -batch "matlab.addons.createToolbox(fullfile(pwd, 'build', 'release-staging'), 'OutputFile', fullfile(pwd, ['simulation_scripts-${VERSION}.mltbx']), 'ProductName', 'ParaxialOptics', 'ProductAuthor', 'Ugalde-Ontiveros J.A.', 'ProductVersion', '${VERSION}', 'ProductDescription', 'Paraxial beam propagation and wavefront analysis'); disp('Toolbox created successfully');"
          ls -lh simulation_scripts-*.mltbx

      - name: Upload MATLAB toolbox
        uses: actions/upload-artifact@v4
        with:
          name: matlab-toolbox
          path: simulation_scripts-*.mltbx
          retention-days: 90

  # ─── GitHub Release ────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-octave]
    permissions:
      contents: write
    steps:
      - name: Download Octave package
        uses: actions/download-artifact@v4
        with:
          name: octave-package
          path: artifacts

      - name: Download MATLAB toolbox if available
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: matlab-toolbox
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
